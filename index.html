<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minecraft World Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.18.3/dist/leaflet-geoman.css"
  />

  <style>
    :root {
      --panel-bg: rgba(12, 16, 22, 0.86);
      --panel-border: rgba(255, 255, 255, 0.18);
      --panel-text: #f3f4f6;
      --muted-text: #cbd5e1;
      --free-city-color: #9e9e9e;
      --ruins-color: #6b7280;
      --accent-color: #d9c27a;
    }

    html, body, #map {
      height: 100%;
      margin: 0;
    }

    body {
      background: #111;
      color: var(--panel-text);
      font: 14px/1.4 "Segoe UI", Tahoma, sans-serif;
    }

    .coord-box, .status-box {
      background: var(--panel-bg);
      color: var(--panel-text);
      padding: 6px 10px;
      border: 1px solid var(--panel-border);
      border-radius: 6px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
    }

    .map-panel {
      position: absolute;
      z-index: 1000;
      background: var(--panel-bg);
      color: var(--panel-text);
      border: 1px solid var(--panel-border);
      border-radius: 10px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(8px);
    }

    .filter-panel {
      top: 12px;
      left: 56px;
      padding: 10px 12px;
      min-width: 180px;
    }

    .timeline-panel {
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      width: min(560px, calc(100vw - 24px));
      padding: 12px 14px;
    }

    .geography-panel {
      display: none;
      right: 12px;
      bottom: 104px;
      width: min(320px, calc(100vw - 24px));
      padding: 12px 14px;
    }

    body.local-edit-enabled .geography-panel {
      display: block;
    }

    .panel-title {
      margin: 0 0 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent-color);
    }

    .panel-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .panel-row + .panel-row {
      margin-top: 8px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted-text);
    }

    .checkbox-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nation-filters {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      max-height: 220px;
      overflow: auto;
    }

    .nation-filters .panel-title {
      margin-bottom: 10px;
    }

    .checkbox-row input {
      margin: 0;
    }

    .timeline-value {
      font-weight: 700;
      color: var(--panel-text);
      white-space: nowrap;
    }

    .timeline-range {
      width: 100%;
      accent-color: var(--accent-color);
    }

    .timeline-hint {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted-text);
    }

    .panel-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .panel-button {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--panel-text);
      padding: 7px 10px;
      cursor: pointer;
      font: inherit;
    }

    .panel-button:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .panel-text {
      margin-top: 10px;
      width: 100%;
      min-height: 150px;
      resize: vertical;
      box-sizing: border-box;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      background: rgba(12, 16, 22, 0.75);
      color: var(--panel-text);
      padding: 10px;
      font: 12px/1.5 Consolas, "Courier New", monospace;
    }

    .panel-note {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted-text);
    }

    .leaflet-control-layers {
      background: var(--panel-bg);
      color: var(--panel-text);
      border: 1px solid var(--panel-border);
      border-radius: 10px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
    }

    .leaflet-control-layers label {
      color: var(--panel-text);
    }

    .leaflet-geo-kind-section {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
    }

    .leaflet-geo-kind-title {
      margin: 0 0 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent-color);
    }

    .leaflet-geo-kind-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .city-icon {
      background: transparent;
      border: 0;
    }

    .city-marker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transform: translate(-8px, -8px);
      white-space: nowrap;
    }

    .city-pin {
      width: 14px;
      height: 14px;
      position: relative;
      border-radius: 999px;
      border: 2px solid rgba(12, 16, 22, 0.95);
      background: var(--marker-color);
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.18);
      flex: 0 0 auto;
    }

    .city-marker.is-ruins .city-pin {
      border-radius: 2px;
      transform: rotate(45deg);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.16) 25%, transparent 25%, transparent 50%, rgba(255, 255, 255, 0.16) 50%, rgba(255, 255, 255, 0.16) 75%, transparent 75%, transparent),
        var(--marker-color);
      background-size: 6px 6px;
    }

    .city-marker.is-capital:not(.is-ruins) .city-pin {
      width: 20px;
      height: 20px;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }

    .city-marker.is-capital:not(.is-ruins) .city-pin::before,
    .city-marker.is-capital:not(.is-ruins) .city-pin::after {
      content: "";
      position: absolute;
      inset: 0;
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 92%, 50% 71%, 21% 92%, 32% 57%, 2% 35%, 39% 35%);
    }

    .city-marker.is-capital:not(.is-ruins) .city-pin::before {
      background: rgba(12, 16, 22, 0.95);
    }

    .city-marker.is-capital:not(.is-ruins) .city-pin::after {
      inset: 3px;
      background: var(--marker-color);
    }

    .city-label {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(12, 16, 22, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.16);
      color: #f8fafc;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .city-popup-title {
      margin-bottom: 6px;
      font-size: 15px;
      font-weight: 700;
      color: #f8fafc;
    }

    .city-popup-meta {
      margin: 0;
      padding: 0;
      list-style: none;
      color: #dbe4ee;
      font-size: 13px;
    }

    .city-popup-meta li + li {
      margin-top: 4px;
    }

    .city-popup-meta strong {
      color: #f8fafc;
    }

    .leaflet-popup-content-wrapper,
    .leaflet-popup-tip {
      background: rgba(15, 23, 42, 0.96);
      color: #e5edf7;
      box-shadow: 0 16px 32px rgba(0, 0, 0, 0.38);
    }

    .leaflet-popup-content {
      margin: 12px 14px;
      color: #e5edf7;
    }

    .geo-label {
      pointer-events: none;
      color: #ecf8ff;
      text-shadow:
        0 1px 1px rgba(255, 255, 255, 0.92),
        0 0 4px rgba(255, 255, 255, 0.78),
        0 1px 8px rgba(8, 15, 24, 0.65);
      padding: 2px 6px;
      font-size: 15px;
      font-weight: 500;
      white-space: nowrap;
    }

    .geo-label.is-sea,
    .geo-label.is-lake,
    .geo-label.is-river {
      color: #dff6ff;
      font-style: italic;
      letter-spacing: 0.05em;
    }

    .geo-label.is-sea,
    .geo-label.is-continent {
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
    }

    .geo-label.is-island {
      color: #fff7d6;
    }

    .geo-marker {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transform: translate(-10px, -18px);
      white-space: nowrap;
    }

    .geo-marker-pin {
      width: 14px;
      height: 14px;
      position: relative;
      flex: 0 0 auto;
      transform: rotate(45deg);
      border-radius: 2px;
      border: 2px solid rgba(46, 30, 14, 0.9);
      background:
        linear-gradient(135deg, #d9d9d9 0%, #b29b79 45%, #796347 100%);
      box-shadow:
        0 0 0 2px rgba(255, 250, 240, 0.45),
        0 6px 12px rgba(0, 0, 0, 0.35);
    }

    .geo-marker-label {
      display: inline-block;
      padding: 2px 0;
      color: #fff6db;
      font-size: 14px;
      font-weight: 600;
      text-shadow:
        0 1px 1px rgba(35, 23, 11, 0.95),
        0 0 4px rgba(35, 23, 11, 0.9);
    }

    @media (max-width: 720px) {
      .filter-panel {
        top: auto;
        bottom: 104px;
        left: 12px;
        right: 12px;
        min-width: 0;
      }

      .timeline-panel {
        width: calc(100vw - 24px);
      }

      .geography-panel {
        top: 12px;
        right: 12px;
        left: 12px;
        width: auto;
      }

      .city-label {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="map-panel filter-panel">
    <div class="panel-title">City Filters</div>
    <div class="checkbox-list">
      <label class="checkbox-row">
        <input id="toggle-capitals" type="checkbox" checked />
        <span>Show capitals</span>
      </label>
      <label class="checkbox-row">
        <input id="toggle-national" type="checkbox" checked />
        <span>Show national cities</span>
      </label>
      <label class="checkbox-row">
        <input id="toggle-free" type="checkbox" checked />
        <span>Show free cities</span>
      </label>
      <label class="checkbox-row">
        <input id="toggle-ruins" type="checkbox" checked />
        <span>Show ruins</span>
      </label>
    </div>
    <div class="nation-filters">
      <div class="panel-title">Nations</div>
      <div id="nation-filters" class="checkbox-list"></div>
    </div>
  </div>

  <div class="map-panel timeline-panel">
    <div class="panel-row">
      <div class="panel-title">Timeline</div>
      <div id="timeline-value" class="timeline-value">-</div>
    </div>
    <input id="timeline-range" class="timeline-range" type="range" min="0" max="0" step="1" value="0" />
    <div class="timeline-hint">Move the slider to inspect city ownership and ruin states for a selected date.</div>
  </div>

  <div class="map-panel geography-panel">
    <div class="panel-row">
      <div class="panel-title">Geography Editor</div>
      <div id="geography-count" class="timeline-value">0</div>
    </div>
    <div class="panel-note">Use the Geoman toolbar on the left to draw markers, lines and polygons. Double-click an object to rename it.</div>
    <div class="panel-actions">
      <button id="save-geography" class="panel-button" type="button">Save Geo</button>
      <button id="export-geography" class="panel-button" type="button">Export GeoJSON</button>
      <button id="copy-geography" class="panel-button" type="button">Copy JSON</button>
      <button id="reload-geography" class="panel-button" type="button">Reload file</button>
    </div>
    <textarea id="geography-json" class="panel-text" spellcheck="false" readonly></textarea>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.18.3/dist/leaflet-geoman.min.js"></script>

  <script>
    const TILE_SIZE = 512;
    const FREE_CITY_COLOR = "#9e9e9e";
    const RUINS_COLOR = "#6b7280";
    const WORLD_BORDER_CONFIG = {
      minX: -10000,
      maxX: 10000,
      minY: -10000,
      maxY: 10000,
      color: "#f4d35e",
      weight: 3,
      opacity: 0.9,
      fillOpacity: 0,
      dashArray: "12 8"
    };

    const ZOOM_OVERVIEW_16 = -6;
    const ZOOM_OVERVIEW_8 = -4;
    const ZOOM_OVERVIEW_4 = -2;
    const ZOOM_DETAILS = 0;
    const EDITOR_IS_LOCAL = isLocalEnvironment();

    const map = L.map("map", {
      crs: L.CRS.Simple,
      minZoom: -6,
      maxZoom: 4,
      zoomSnap: 0.25
    });

    map.createPane("geoBasePane");
    map.getPane("geoBasePane").style.zIndex = 410;
    map.createPane("geoRegionPane");
    map.getPane("geoRegionPane").style.zIndex = 420;
    map.createPane("geoFeaturePane");
    map.getPane("geoFeaturePane").style.zIndex = 430;
    map.createPane("geoLabelPane");
    map.getPane("geoLabelPane").style.zIndex = 590;
    map.createPane("cityPane");
    map.getPane("cityPane").style.zIndex = 640;
    map.createPane("capitalPane");
    map.getPane("capitalPane").style.zIndex = 650;

    const tileLayers = {
      overview16: L.layerGroup(),
      overview8: L.layerGroup(),
      overview4: L.layerGroup(),
      details: L.layerGroup()
    };

    const layers = {
      worldBorder: L.layerGroup().addTo(map),
      cities: L.layerGroup().addTo(map),
      geography: L.featureGroup().addTo(map),
      geographyLabels: L.layerGroup().addTo(map)
    };

    const runtime = {
      cityDataset: null,
      nationById: new Map(),
      nationVisibility: new Map(),
      activeDate: null,
      timelineDates: [],
      showRuins: true,
      showCapitals: true,
      showNationalCities: true,
      showFreeCities: true,
      visibleCities: 0,
      totalCities: 0,
      geographyCount: 0,
      geographyEntries: [],
      geographyKindVisibility: new Map(),
      geographyFileHandle: null,
      geographyDirty: false,
      tileCount: 0,
      tileModeLabel: "Loading"
    };

    if (EDITOR_IS_LOCAL) {
      document.body.classList.add("local-edit-enabled");
    }

    function gameToLatLng(x, y) {
      return L.latLng(-y, x);
    }

    function isLocalEnvironment() {
      return location.protocol === "file:" || ["localhost", "127.0.0.1", "::1"].includes(location.hostname);
    }

    function latLngToGame(latlng) {
      return {
        x: Math.round(latlng.lng),
        y: Math.round(-latlng.lat)
      };
    }

    async function fetchJson(path) {
      const response = await fetch(path);
      if (!response.ok) {
        throw new Error(`Failed to load ${path}: ${response.status}`);
      }
      return response.json();
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      })[char]);
    }

    function formatDate(isoDate) {
      if (!isoDate) return "No date";
      if (/^\d{4}$/.test(isoDate)) return isoDate;
      const date = new Date(`${isoDate}T00:00:00Z`);
      if (Number.isNaN(date.getTime())) return isoDate;
      return new Intl.DateTimeFormat("ru-RU", {
        year: "numeric",
        month: "short",
        day: "numeric",
        timeZone: "UTC"
      }).format(date);
    }

    function describeStatus(status) {
      return status === "ruins" ? "Ruins" : "Active";
    }

    function getTileBounds(tileX, tileY) {
      const x1 = tileX * TILE_SIZE;
      const y1 = tileY * TILE_SIZE;
      const x2 = x1 + TILE_SIZE;
      const y2 = y1 + TILE_SIZE;

      return L.latLngBounds(
        gameToLatLng(x1, y2),
        gameToLatLng(x2, y1)
      );
    }

    function getWorldBorderBounds() {
      return L.latLngBounds(
        gameToLatLng(WORLD_BORDER_CONFIG.minX, WORLD_BORDER_CONFIG.maxY),
        gameToLatLng(WORLD_BORDER_CONFIG.maxX, WORLD_BORDER_CONFIG.minY)
      );
    }

    function renderWorldBorder() {
      layers.worldBorder.clearLayers();

      L.rectangle(getWorldBorderBounds(), {
        color: WORLD_BORDER_CONFIG.color,
        weight: WORLD_BORDER_CONFIG.weight,
        opacity: WORLD_BORDER_CONFIG.opacity,
        fillOpacity: WORLD_BORDER_CONFIG.fillOpacity,
        dashArray: WORLD_BORDER_CONFIG.dashArray,
        interactive: false
      }).addTo(layers.worldBorder);
    }

    const CoordControl = L.Control.extend({
      onAdd: function() {
        this._div = L.DomUtil.create("div", "coord-box");
        this._div.innerHTML = "X: -, Y: -";
        return this._div;
      },
      update: function(latlng) {
        if (!latlng) return;
        const point = latLngToGame(latlng);
        this._div.innerHTML = `X: ${point.x}, Y: ${point.y}`;
      }
    });

    const StatusControl = L.Control.extend({
      onAdd: function() {
        this._div = L.DomUtil.create("div", "status-box");
        this._div.innerHTML = "Loading...";
        return this._div;
      },
      setText: function(text) {
        this._div.innerHTML = text;
      }
    });

    const coordControl = new CoordControl({ position: "bottomleft" });
    const statusControl = new StatusControl({ position: "topright" });
    coordControl.addTo(map);
    statusControl.addTo(map);

    const layerControl = L.control.layers(null, {
      "World border": layers.worldBorder
    }, {
      collapsed: false
    }).addTo(map);

    const geographyKindSection = document.createElement("div");
    geographyKindSection.className = "leaflet-geo-kind-section";
    geographyKindSection.innerHTML = `
      <div class="leaflet-geo-kind-title">Geography</div>
      <div id="geography-filters" class="leaflet-geo-kind-list"></div>
    `;
    layerControl.getContainer().querySelector(".leaflet-control-layers-list").appendChild(geographyKindSection);

    map.on("mousemove", function(event) {
      coordControl.update(event.latlng);
    });

    function renderStatus() {
      const parts = [
        `${runtime.tileModeLabel}`,
        `Tiles: ${runtime.tileCount}`,
        `Cities: ${runtime.visibleCities}/${runtime.totalCities}`,
        `Geo: ${runtime.geographyCount}`,
        `Date: ${runtime.activeDate ?? "-"}`
      ];
      statusControl.setText(parts.join(" | "));
    }

    function getLayerKind(layer) {
      if (layer instanceof L.Marker) return "mountain";
      if (layer instanceof L.Polygon && !(layer instanceof L.Rectangle)) return "region";
      if (layer instanceof L.Rectangle) return "region";
      if (layer instanceof L.Polyline) return "river";
      return "feature";
    }

    function getLayerName(layer) {
      return layer.feature?.properties?.name?.trim() || "";
    }

    function getFeatureProperties(layer) {
      return layer.feature?.properties ?? {};
    }

    function normalizeKind(kind) {
      const value = String(kind ?? "").trim().toLowerCase();
      return value || "feature";
    }

    function ensureFeatureMetadata(layer) {
      if (!layer.feature) {
        layer.feature = {
          type: "Feature",
          properties: {}
        };
      }
      if (!layer.feature.properties) {
        layer.feature.properties = {};
      }
      return layer.feature.properties;
    }

    function promptForFeatureMetadata(layer) {
      const properties = ensureFeatureMetadata(layer);
      const currentName = properties.name ?? "";
      const currentKind = properties.kind ?? getLayerKind(layer);
      const name = window.prompt("Object name", currentName);
      if (name === null) return false;
      const kind = window.prompt("Object type (continent, sea, lake, river, island, mountain, region)", currentKind);
      if (kind === null) return false;
      properties.name = name.trim();
      properties.kind = kind.trim() || currentKind;
      return true;
    }

    function getLayerLabelLatLng(layer) {
      if (layer instanceof L.Marker) return layer.getLatLng();
      if (typeof layer.getBounds === "function") return layer.getBounds().getCenter();
      return null;
    }

    function getLabelClass(kind) {
      return `geo-label is-${kind || "feature"}`;
    }

    function getGeographyPaneName(layer, kind) {
      const normalizedKind = normalizeKind(kind);
      if (["continent", "island", "sea"].includes(normalizedKind)) {
        return "geoBasePane";
      }
      if (normalizedKind === "region") {
        return "geoRegionPane";
      }
      return "geoFeaturePane";
    }

    function markGeographyDirty() {
      if (!EDITOR_IS_LOCAL) return;
      runtime.geographyDirty = true;
    }

    function markGeographySaved() {
      runtime.geographyDirty = false;
    }

    function isGeographyKindVisible(kind) {
      return runtime.geographyKindVisibility.get(normalizeKind(kind)) !== false;
    }

    function collectGeographyKinds() {
      const kinds = new Set();
      for (const entry of runtime.geographyEntries) {
        kinds.add(normalizeKind(getFeatureProperties(entry.layer).kind ?? getLayerKind(entry.layer)));
      }
      return Array.from(kinds).sort();
    }

    function formatKindLabel(kind) {
      return kind
        .split(/[_\-\s]+/)
        .filter(Boolean)
        .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
        .join(" ");
    }

    function flattenLatLngs(latlngs) {
      if (!Array.isArray(latlngs)) return [];
      if (!latlngs.length) return [];
      if (Array.isArray(latlngs[0])) {
        return flattenLatLngs(latlngs[0]);
      }
      return latlngs;
    }

    function getPolylineLabelLatLng(layer) {
      const points = flattenLatLngs(layer.getLatLngs());
      if (!points.length) return null;
      if (points.length === 1) return points[0];

      let total = 0;
      const segments = [];
      for (let i = 1; i < points.length; i += 1) {
        const length = points[i - 1].distanceTo(points[i]);
        segments.push(length);
        total += length;
      }

      if (!total) {
        return points[Math.floor(points.length / 2)];
      }

      const halfway = total / 2;
      let traversed = 0;
      for (let i = 1; i < points.length; i += 1) {
        const segmentLength = segments[i - 1];
        if (traversed + segmentLength >= halfway) {
          const ratio = (halfway - traversed) / segmentLength;
          return L.latLng(
            points[i - 1].lat + (points[i].lat - points[i - 1].lat) * ratio,
            points[i - 1].lng + (points[i].lng - points[i - 1].lng) * ratio
          );
        }
        traversed += segmentLength;
      }

      return points[points.length - 1];
    }

    function styleGeographyLayer(layer) {
      const kind = getFeatureProperties(layer).kind ?? getLayerKind(layer);
      layer.options.pane = getGeographyPaneName(layer, kind);

      if (layer instanceof L.Marker) {
        layer.setIcon(L.divIcon({
          className: "geo-marker-icon",
          html: `
            <span class="geo-marker">
              <span class="geo-marker-pin"></span>
              <span class="geo-marker-label">${escapeHtml(getLayerName(layer) || kind)}</span>
            </span>
          `
        }));
        return;
      }

      const styleByKind = {
        river: {
          color: "#76b8ff",
          weight: 4,
          opacity: 0.95,
          lineCap: "round",
          lineJoin: "round"
        },
        lake: {
          color: "#89c8ff",
          weight: 1.5,
          opacity: 0.95,
          fillColor: "#68b7ff",
          fillOpacity: 0.25
        },
        sea: {
          color: "#9fd7ff",
          weight: 1.25,
          opacity: 0.9,
          fillColor: "#6ab7f5",
          fillOpacity: 0.18
        },
        continent: {
          color: "#d7cf9c",
          weight: 1.5,
          opacity: 0.82,
          fillColor: "#8a885e",
          fillOpacity: 0.08
        },
        island: {
          color: "#e6d39f",
          weight: 1.5,
          opacity: 0.9,
          fillColor: "#9f8c55",
          fillOpacity: 0.1
        },
        region: {
          color: "#f2dfaa",
          weight: 1.5,
          opacity: 0.8,
          fillOpacity: 0.03,
          dashArray: "9 6"
        }
      };
      const style = styleByKind[kind] ?? { color: "#d9c27a", weight: 2, opacity: 0.9, fillOpacity: 0.06 };
      if (typeof layer.setStyle === "function") {
        layer.setStyle(style);
      }
    }

    function bindGeographyInteractions(layer) {
      if (!EDITOR_IS_LOCAL) return;
      layer.on("dblclick", function(event) {
        L.DomEvent.stop(event);
        if (!promptForFeatureMetadata(layer)) return;
        markGeographyDirty();
        refreshGeographyLayer(layer);
        syncGeographyEditor();
      });
    }

    function refreshGeographyLabels() {
      layers.geographyLabels.clearLayers();
      let count = 0;

      for (const entry of runtime.geographyEntries) {
        const layer = entry.layer;
        count += 1;
        const kind = getFeatureProperties(layer).kind ?? getLayerKind(layer);
        if (!isGeographyKindVisible(kind)) continue;
        const name = getLayerName(layer);
        if (!name) continue;
        const latlng = kind === "river" && layer instanceof L.Polyline
          ? getPolylineLabelLatLng(layer)
          : getLayerLabelLatLng(layer);
        if (!latlng) continue;

        L.marker(latlng, {
          interactive: false,
          keyboard: false,
          pane: "geoLabelPane",
          icon: L.divIcon({
            className: "geo-label-icon",
            html: `<span class="${getLabelClass(kind)}">${escapeHtml(name)}</span>`
          })
        }).addTo(layers.geographyLabels);
      }

      runtime.geographyCount = count;
      document.getElementById("geography-count").textContent = String(count);
      renderStatus();
    }

    function renderGeographyKindFilters() {
      const container = document.getElementById("geography-filters");
      container.innerHTML = "";

      for (const kind of collectGeographyKinds()) {
        if (!runtime.geographyKindVisibility.has(kind)) {
          runtime.geographyKindVisibility.set(kind, true);
        }

        const label = document.createElement("label");
        label.className = "checkbox-row";
        label.innerHTML = `
          <input type="checkbox" data-geo-kind="${escapeHtml(kind)}" ${runtime.geographyKindVisibility.get(kind) ? "checked" : ""} />
          <span>${escapeHtml(formatKindLabel(kind))}</span>
        `;

        label.querySelector("input").addEventListener("change", function(event) {
          runtime.geographyKindVisibility.set(kind, event.target.checked);
          renderGeography();
        });

        container.appendChild(label);
      }
    }

    function renderGeography() {
      layers.geography.clearLayers();
      layers.geographyLabels.clearLayers();

      for (const entry of runtime.geographyEntries) {
        const layer = entry.layer;
        const kind = getFeatureProperties(layer).kind ?? getLayerKind(layer);
        if (!isGeographyKindVisible(kind)) continue;
        layers.geography.addLayer(layer);
      }

      refreshGeographyLabels();
    }

    function refreshGeographyLayer(layer) {
      styleGeographyLayer(layer);
      bindGeographyInteractions(layer);
      const properties = ensureFeatureMetadata(layer);
      if (!properties.kind) {
        properties.kind = getLayerKind(layer);
      }
      if (!properties.name) {
        properties.name = "";
      }
      const name = properties.name || properties.kind;
      layer.bindPopup(`
        <div class="city-popup-title">${escapeHtml(name)}</div>
        <ul class="city-popup-meta">
          <li><strong>Type:</strong> ${escapeHtml(properties.kind)}</li>
          <li><strong>Name:</strong> ${escapeHtml(properties.name || "(empty)")}</li>
          <li><strong>Tip:</strong> ${escapeHtml(EDITOR_IS_LOCAL ? "Double-click to edit metadata" : "Read-only on public map")}</li>
        </ul>
      `);
      renderGeographyKindFilters();
      renderGeography();
    }

    function latLngsToGameCoordinates(latlngs) {
      if (!Array.isArray(latlngs)) return [];
      if (!latlngs.length) return [];
      if (Array.isArray(latlngs[0])) {
        return latlngs.map(latLngsToGameCoordinates);
      }
      return latlngs.map((latlng) => {
        const point = latLngToGame(latlng);
        return [point.x, point.y];
      });
    }

    function featureGeometryFromLayer(layer) {
      if (layer instanceof L.Marker) {
        const point = latLngToGame(layer.getLatLng());
        return {
          type: "Point",
          coordinates: [point.x, point.y]
        };
      }

      if (layer instanceof L.Polygon) {
        return {
          type: "Polygon",
          coordinates: latLngsToGameCoordinates(layer.getLatLngs())
        };
      }

      if (layer instanceof L.Polyline) {
        return {
          type: "LineString",
          coordinates: latLngsToGameCoordinates(layer.getLatLngs())
        };
      }

      return null;
    }

    function serializeGeographyObject() {
      const features = [];
      for (const entry of runtime.geographyEntries) {
        const layer = entry.layer;
        const geometry = featureGeometryFromLayer(layer);
        if (!geometry) continue;

        features.push({
          type: "Feature",
          properties: { ...ensureFeatureMetadata(layer) },
          geometry
        });
      }

      return {
        type: "FeatureCollection",
        features
      };
    }

    function serializeGeography() {
      const featureCollection = serializeGeographyObject();
      const json = JSON.stringify(featureCollection, null, 2);
      document.getElementById("geography-json").value = json;
      return json;
    }

    function syncGeographyEditor() {
      serializeGeography();
      refreshGeographyLabels();
    }

    function attachGeographyLayer(layer, skipPrompt = false) {
      if (!layer) return;
      ensureFeatureMetadata(layer);
      if (!skipPrompt && EDITOR_IS_LOCAL) {
        promptForFeatureMetadata(layer);
      }
      if (!runtime.geographyEntries.some((entry) => entry.layer === layer)) {
        runtime.geographyEntries.push({ layer });
      }
      refreshGeographyLayer(layer);
      syncGeographyEditor();
    }

    function geometryToLayer(geometry) {
      if (!geometry?.type) return null;

      if (geometry.type === "Point") {
        const [x, y] = geometry.coordinates ?? [];
        if (!Number.isFinite(x) || !Number.isFinite(y)) return null;
        return L.marker(gameToLatLng(x, y));
      }

      if (geometry.type === "LineString") {
        const latlngs = (geometry.coordinates ?? []).map(([x, y]) => gameToLatLng(x, y));
        return L.polyline(latlngs);
      }

      if (geometry.type === "Polygon") {
        const rings = (geometry.coordinates ?? []).map((ring) =>
          ring.map(([x, y]) => gameToLatLng(x, y))
        );
        return L.polygon(rings);
      }

      return null;
    }

    async function loadGeography() {
      try {
        const geojson = await fetchJson("data/geography.json");
        runtime.geographyEntries = [];
        layers.geography.clearLayers();
        layers.geographyLabels.clearLayers();

        for (const feature of geojson?.features ?? []) {
          const layer = geometryToLayer(feature.geometry);
          if (!layer) continue;
          layer.feature = {
            type: "Feature",
            properties: { ...(feature.properties ?? {}) }
          };
          attachGeographyLayer(layer, true);
        }
        markGeographySaved();
      } catch (error) {
        if (String(error.message).includes("404")) {
          syncGeographyEditor();
          markGeographySaved();
          return;
        }
        throw error;
      }
    }

    function downloadTextFile(filename, content) {
      const blob = new Blob([content], { type: "application/geo+json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    async function saveGeographyToFile() {
      if (!EDITOR_IS_LOCAL) return;

      const json = serializeGeography();
      if (!window.showSaveFilePicker) {
        downloadTextFile("geography.json", json);
        return;
      }

      try {
        if (!runtime.geographyFileHandle) {
          runtime.geographyFileHandle = await window.showSaveFilePicker({
            suggestedName: "geography.json",
            types: [
              {
                description: "GeoJSON",
                accept: {
                  "application/json": [".json"],
                  "application/geo+json": [".geojson", ".json"]
                }
              }
            ]
          });
        }

        const writable = await runtime.geographyFileHandle.createWritable();
        await writable.write(json);
        await writable.close();
        markGeographySaved();
        renderStatus();
        statusControl.setText("Geography saved");
      } catch (error) {
        if (error?.name === "AbortError") return;
        throw error;
      }
    }

    async function configureGeoman() {
      if (!EDITOR_IS_LOCAL) return;
      if (!map.pm) {
        throw new Error("Leaflet-Geoman did not initialize");
      }

      map.pm.setGlobalOptions({
        layerGroup: layers.geography,
        continueDrawing: false,
        snapSegment: true,
        snapVertex: true,
        snappable: true
      });

      map.pm.addControls({
        position: "topleft",
        drawMarker: true,
        drawPolyline: true,
        drawRectangle: true,
        drawPolygon: true,
        editMode: true,
        dragMode: true,
        removalMode: true,
        drawCircle: false,
        drawCircleMarker: false,
        cutPolygon: false
      });

      map.on("pm:create", function(event) {
        if (!event.layer) return;
        markGeographyDirty();
        attachGeographyLayer(event.layer);
      });

      map.on("pm:edit", function() {
        markGeographyDirty();
        syncGeographyEditor();
      });

      map.on("pm:remove", function(event) {
        if (event.layer) {
          runtime.geographyEntries = runtime.geographyEntries.filter((entry) => entry.layer !== event.layer);
        }
        markGeographyDirty();
        syncGeographyEditor();
      });
    }

    function showOnly(groupToShow) {
      const groups = [
        tileLayers.overview16,
        tileLayers.overview8,
        tileLayers.overview4,
        tileLayers.details
      ];

      for (const group of groups) {
        if (group === groupToShow) {
          if (!map.hasLayer(group)) group.addTo(map);
        } else if (map.hasLayer(group)) {
          map.removeLayer(group);
        }
      }
    }

    function updateZoomLayers() {
      const zoom = map.getZoom();

      if (zoom < ZOOM_OVERVIEW_8) {
        showOnly(tileLayers.overview16);
        runtime.tileModeLabel = `Zoom ${zoom}: overview 16x`;
      } else if (zoom < ZOOM_OVERVIEW_4) {
        showOnly(tileLayers.overview8);
        runtime.tileModeLabel = `Zoom ${zoom}: overview 8x`;
      } else if (zoom < ZOOM_DETAILS) {
        showOnly(tileLayers.overview4);
        runtime.tileModeLabel = `Zoom ${zoom}: overview 4x`;
      } else {
        showOnly(tileLayers.details);
        runtime.tileModeLabel = `Zoom ${zoom}: detailed tiles`;
      }

      renderStatus();
    }

    function validateCityDataset(dataset) {
      const nations = Array.isArray(dataset?.nations) ? dataset.nations : [];
      const cities = Array.isArray(dataset?.cities) ? dataset.cities : [];
      return {
        nations,
        cities,
        timelineDates: collectTimelineDates(dataset, cities)
      };
    }

    function collectTimelineDates(dataset, cities) {
      const dates = new Set(Array.isArray(dataset?.timeline?.dates) ? dataset.timeline.dates : []);
      for (const city of cities) {
        for (const state of city.states ?? []) {
          if (state.from) dates.add(state.from);
          if (state.to) dates.add(state.to);
        }
      }
      return Array.from(dates).sort();
    }

    function resolveCityState(city, activeDate) {
      for (const state of city.states ?? []) {
        const startsBefore = !state.from || state.from <= activeDate;
        const endsAfter = !state.to || activeDate < state.to;
        if (startsBefore && endsAfter) return state;
      }
      return null;
    }

    function getCityColor(state) {
      if (state.status === "ruins") return RUINS_COLOR;
      if (!state.nation_id) return FREE_CITY_COLOR;
      return runtime.nationById.get(state.nation_id)?.color ?? FREE_CITY_COLOR;
    }

    function buildCityIcon(city, state) {
      const color = getCityColor(state);
      const classes = ["city-marker"];
      if (state.status === "ruins") classes.push("is-ruins");
      if (state.is_capital) classes.push("is-capital");

      return L.divIcon({
        className: "city-icon",
        html: `
          <span class="${classes.join(" ")}" style="--marker-color: ${color}">
            <span class="city-pin"></span>
            <span class="city-label">${escapeHtml(state.label || city.name)}</span>
          </span>
        `
      });
    }

    function buildCityPopup(city, state) {
      const nation = state.nation_id ? runtime.nationById.get(state.nation_id) : null;
      const tags = Array.isArray(state.tags) && state.tags.length ? state.tags.join(", ") : "none";

      return `
        <div class="city-popup-title">${escapeHtml(state.label || city.name)}</div>
        <ul class="city-popup-meta">
          <li><strong>Status:</strong> ${escapeHtml(describeStatus(state.status))}</li>
          <li><strong>Capital:</strong> ${state.is_capital ? "Yes" : "No"}</li>
          <li><strong>Nation:</strong> ${escapeHtml(nation?.name ?? "Free city")}</li>
          <li><strong>Coordinates:</strong> X ${city.x}, Y ${city.y}</li>
          <li><strong>Active from:</strong> ${escapeHtml(formatDate(state.from))}</li>
          <li><strong>Tags:</strong> ${escapeHtml(tags)}</li>
        </ul>
      `;
    }

    function renderCities() {
      layers.cities.clearLayers();

      if (!runtime.cityDataset || !runtime.activeDate) {
        runtime.visibleCities = 0;
        runtime.totalCities = 0;
        renderStatus();
        return;
      }

      let visibleCities = 0;
      const cities = runtime.cityDataset.cities;
      runtime.totalCities = cities.length;

      for (const city of cities) {
        const state = resolveCityState(city, runtime.activeDate);
        if (!state) continue;
        if (state.status === "ruins" && !runtime.showRuins) continue;
        if (state.status !== "ruins" && state.is_capital && !runtime.showCapitals) continue;
        if (state.status !== "ruins" && !state.is_capital && state.nation_id && !runtime.showNationalCities) continue;
        if (state.status !== "ruins" && !state.nation_id && !runtime.showFreeCities) continue;
        if (state.nation_id && runtime.nationVisibility.get(state.nation_id) === false) continue;

        const marker = L.marker(gameToLatLng(city.x, city.y), {
          icon: buildCityIcon(city, state),
          pane: state.is_capital ? "capitalPane" : "cityPane",
          keyboard: false
        });
        marker.bindPopup(buildCityPopup(city, state));
        marker.addTo(layers.cities);
        visibleCities += 1;
      }

      runtime.visibleCities = visibleCities;
      renderStatus();
    }

    function syncTimelineUi() {
      const range = document.getElementById("timeline-range");
      const value = document.getElementById("timeline-value");
      const dates = runtime.timelineDates;

      if (!dates.length) {
        range.disabled = true;
        range.min = 0;
        range.max = 0;
        range.value = 0;
        value.textContent = "No dates";
        return;
      }

      range.disabled = dates.length === 1;
      range.min = 0;
      range.max = dates.length - 1;

      let index = dates.indexOf(runtime.activeDate);
      if (index === -1) index = dates.length - 1;
      range.value = index;
      value.textContent = formatDate(dates[index]);
    }

    function setActiveDateByIndex(index) {
      const dates = runtime.timelineDates;
      if (!dates.length) return;

      const safeIndex = Math.max(0, Math.min(index, dates.length - 1));
      runtime.activeDate = dates[safeIndex];
      syncTimelineUi();
      renderCities();
    }

    function renderNationFilters() {
      const container = document.getElementById("nation-filters");
      container.innerHTML = "";

      for (const nation of runtime.cityDataset?.nations ?? []) {
        if (!runtime.nationVisibility.has(nation.id)) {
          runtime.nationVisibility.set(nation.id, true);
        }

        const label = document.createElement("label");
        label.className = "checkbox-row";
        label.innerHTML = `
          <input type="checkbox" data-nation-id="${escapeHtml(nation.id)}" ${runtime.nationVisibility.get(nation.id) ? "checked" : ""} />
          <span>${escapeHtml(nation.name)}</span>
        `;

        const input = label.querySelector("input");
        input.addEventListener("change", function(event) {
          runtime.nationVisibility.set(nation.id, event.target.checked);
          renderCities();
        });

        container.appendChild(label);
      }
    }

    async function loadCities() {
      const dataset = await fetchJson("data/cities.json");
      const validated = validateCityDataset(dataset);

      runtime.cityDataset = {
        nations: validated.nations,
        cities: validated.cities
      };
      runtime.nationById = new Map(validated.nations.map((nation) => [nation.id, nation]));
      runtime.nationVisibility = new Map(validated.nations.map((nation) => [nation.id, true]));
      runtime.timelineDates = validated.timelineDates;
      runtime.activeDate = dataset?.timeline?.default_date ?? validated.timelineDates[validated.timelineDates.length - 1] ?? null;

      renderNationFilters();
      syncTimelineUi();
      renderCities();
    }

    async function loadMap() {
      const [meta, tiles] = await Promise.all([
        fetchJson("previews/overview_meta.json"),
        fetchJson("tiles.json")
      ]);

      const fullBounds = L.latLngBounds(
        gameToLatLng(meta.min_x, meta.max_y),
        gameToLatLng(meta.max_x, meta.min_y)
      );
      const mapBounds = L.latLngBounds(fullBounds.getSouthWest(), fullBounds.getNorthEast());

      L.imageOverlay("previews/overview_16x.jpg", fullBounds).addTo(tileLayers.overview16);
      L.imageOverlay("previews/overview_8x.jpg", fullBounds).addTo(tileLayers.overview8);
      L.imageOverlay("previews/overview_4x.jpg", fullBounds).addTo(tileLayers.overview4);

      for (const tile of tiles) {
        L.imageOverlay(tile.file, getTileBounds(tile.x, tile.y)).addTo(tileLayers.details);
      }

      renderWorldBorder();

      runtime.tileCount = tiles.length;
      mapBounds.extend(getWorldBorderBounds());
      map.fitBounds(mapBounds);
      updateZoomLayers();
      await loadCities();
      await loadGeography();
    }

    document.getElementById("toggle-ruins").addEventListener("change", function(event) {
      runtime.showRuins = event.target.checked;
      renderCities();
    });

    document.getElementById("toggle-capitals").addEventListener("change", function(event) {
      runtime.showCapitals = event.target.checked;
      renderCities();
    });

    document.getElementById("toggle-national").addEventListener("change", function(event) {
      runtime.showNationalCities = event.target.checked;
      renderCities();
    });

    document.getElementById("toggle-free").addEventListener("change", function(event) {
      runtime.showFreeCities = event.target.checked;
      renderCities();
    });

    document.getElementById("timeline-range").addEventListener("input", function(event) {
      setActiveDateByIndex(Number(event.target.value));
    });

    if (EDITOR_IS_LOCAL) {
      document.getElementById("save-geography").addEventListener("click", function() {
        saveGeographyToFile().catch((error) => {
          console.error(error);
          statusControl.setText(`Error: ${error.message}`);
        });
      });

      document.getElementById("export-geography").addEventListener("click", function() {
        downloadTextFile("geography.json", serializeGeography());
      });

      document.getElementById("copy-geography").addEventListener("click", async function() {
        const json = serializeGeography();
        try {
          await navigator.clipboard.writeText(json);
        } catch (error) {
          console.warn("Clipboard write failed", error);
        }
      });

      document.getElementById("reload-geography").addEventListener("click", function() {
        loadGeography().catch((error) => {
          console.error(error);
          statusControl.setText(`Error: ${error.message}`);
        });
      });
    }

    map.on("zoomend", updateZoomLayers);

    window.addEventListener("beforeunload", function(event) {
      if (!EDITOR_IS_LOCAL || !runtime.geographyDirty) return;
      const message = "You have unsaved geography changes. Leaving this page may discard them.";
      event.preventDefault();
      event.returnValue = message;
      return message;
    });

    (async function bootstrap() {
      try {
        await loadMap();
        await configureGeoman();
      } catch (error) {
        console.error(error);
        statusControl.setText(`Error: ${error.message}`);
        alert(error.message);
      }
    })();
  </script>
</body>
</html>
